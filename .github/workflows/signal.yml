name: BTC 5m Signal

on:
  workflow_dispatch:  # déclenché uniquement par cron-job.org (évite le double trigger avec le cron GitHub natif)

jobs:
  signal:
    runs-on: ubuntu-latest
    timeout-minutes: 4  # kill si ça dépasse 4 min (ne doit pas arriver)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Nécessaire pour pouvoir committer le log ensuite
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install py-clob-client --quiet

      - name: Run signal
        run: python btc5m/btc5m_signal.py signal
        # Continue même si pas de marché actif
        continue-on-error: true

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POLYMARKET_WALLET_ADDR: ${{ secrets.POLYMARKET_WALLET_ADDR }}
        run: python btc5m/btc5m_notify.py
        continue-on-error: true

      - name: Execute trade (bot)
        env:
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLYMARKET_PRIVATE_KEY }}
          POLYMARKET_WALLET_ADDR: ${{ secrets.POLYMARKET_WALLET_ADDR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python btc5m/btc5m_bot.py
        continue-on-error: true

      - name: Commit logs if updated
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add btc5m/signal_log.json
          git add btc5m/execution_log.json || true
          # Commit d'abord (working tree propre), puis rebase, puis push
          git diff --staged --quiet || git commit -m "signal log [$(date -u '+%H:%M UTC')]"
          git pull --rebase origin main
          git push
        # Ne fail pas si rien à committer
        continue-on-error: true
